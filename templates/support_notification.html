<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Outfit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            color: #1e293b;
        }

        .email-container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
        }

        .header {
            background-color: #6366f1;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }

        .content {
            padding: 40px;
        }

        .greeting {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #0f172a;
        }

        .ticket-info {
            display: inline-block;
            background-color: #f1f5f9;
            padding: 8px 16px;
            border-radius: 12px;
            font-family: monospace;
            font-weight: 900;
            color: #6366f1;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .message-box {
            background-color: #fafafa;
            border-left: 4px solid #6366f1;
            padding: 24px;
            border-radius: 0 24px 24px 0;
            margin: 24px 0;
            line-height: 1.6;
            color: #475569;
            font-size: 16px;
            white-space: pre-wrap;
        }

        .action-button {
            display: inline-block;
            background-color: #0f172a;
            color: #ffffff !important;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 20px;
            transition: all 0.2s ease;
        }

        .footer {
            padding: 30px 40px;
            text-align: center;
            background-color: #f8fafc;
            border-top: 1px solid #f1f5f9;
        }

        .footer p {
            font-size: 12px;
            color: #94a3b8;
            margin: 0;
            font-weight: 500;
        }

        .footer .brand {
            font-weight: 900;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="header">
            <h1>Support Update</h1>
        </div>
        <div class="content">
            <div class="greeting">Hello {{name}},</div>
            <div class="ticket-info">Ticket ID: {{ticketNo}}</div>
            
            <div class="message-box">
                {{message}}
            </div>

            <p style="margin-top: 30px; font-size: 14px; color: #64748b; font-weight: 500;">
                Click the button below to view the full details and continue the conversation in our support center.
            </p>
            
            <a href="{{link}}" class="action-button">View Ticket Details</a>
        </div>
        <div class="footer">
            <span class="brand">Ithyaraa</span>
            <p>&copy; 2026 Ithyaraa Platform. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
