<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>{{title}}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 16px;
            color: #222222;
        }

        p {
            font-size: 14px;
            line-height: 1.6;
            color: #444444;
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #888888;
            text-align: center;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            margin-top: 16px;
            background-color: #111827;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }

        a {
            color: #111827;
        }
    </style>
</head>

<body>
    <div class="container">
        <p>Hi {{name}},</p>

        <h1>{{title}}</h1>

        <!-- HTML content from admin editor -->
        <div>
            {{contentHtml}}
        </div>

        <div class="footer">
            <p>
                You are receiving this email because you subscribed to the Ithyaraa newsletter.
            </p>
            <p>
                If you no longer wish to receive these emails, you can
                <a href="{{unsubscribeLink}}">unsubscribe instantly</a>.
            </p>
        </div>
    </div>
</body>

</html>
